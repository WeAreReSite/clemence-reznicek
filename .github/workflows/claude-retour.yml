name: Claude - Retour Client

on:
  issues:
    types: [opened, labeled]

jobs:
  implement-retour:
    if: |
      contains(github.event.issue.labels.*.name, 'retour-client') &&
      contains(github.event.issue.labels.*.name, 'claude')
    runs-on: [self-hosted, resite]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Create branch
        id: branch
        run: |
          BRANCH_NAME="retour/${{ github.event.issue.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare workspace
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .retour/tasks .retour/logs .retour/prompts .retour/answers
          printf '%s' "$ISSUE_BODY" > .retour/issue-body.md

      # ══════════════════════════════════════════════
      # AGENT 1 : PARSER
      # ══════════════════════════════════════════════
      - name: "Agent 1: Parse & Plan"
        run: |
          cat > .retour/prompts/parser.txt << 'EOF'
          Tu es l'agent PARSER et DIRECTEUR ARTISTIQUE du pipeline retour client WeAreReSite.
          Tu es expert en web design, UX/UI, SEO, strategie de conversion, et sites wellness/beaute.

          ## Ta mission

          1. Lis le fichier .retour/issue-body.md (retour client)
          2. Lis CLAUDE.md pour comprendre l'architecture du projet
          3. Lis les fichiers du projet pour comprendre l'etat actuel (content/, components/, globals.css)
          4. DECOUPE le retour en taches individuelles
          5. EVALUE chaque demande avec ton expertise — tu n'es PAS un robot executant

          ## Tu es l'expert, pas le client

          Le client donne son avis mais n'est PAS designer ni developpeur. Pour CHAQUE demande tu dois :

          - Si c'est une bonne idee -> status "implement"
          - Si c'est une mauvaise idee -> status "reject" avec explication professionnelle
          - Si c'est une idee a adapter -> status "adapt" avec ta version amelioree

          ### Principes de design que tu defendes :

          - HERO : maximum 2 CTAs. Un principal (prise de RDV / contact) visuellement dominant, un secondaire. JAMAIS 3+.
          - ABOVE THE FOLD : le message principal + CTA doivent etre visibles sans scroller
          - HIERARCHIE VISUELLE : une seule action prioritaire par section
          - IMAGES : coherence visuelle, qualite pro, pas de surcharge
          - TEXTE : concis, orienté benefice client, pas de pavés
          - ANIMATIONS : subtiles et purposeful, jamais gratuites
          - CONVERSION : chaque element doit servir le parcours vers la prise de RDV
          - BACKGROUNDS/TEXTURES : ce sont des elements de STYLE (globals.css, composant TSX), PAS du content

          ## Comprendre le codebase

          L'architecture separe strictement :
          - **Texte/contenu** -> content/*.ts (strings, labels, descriptions)
          - **Images de contenu** -> content/*.ts (references) + public/images/ (fichiers)
          - **Style/visuels** -> src/app/globals.css (@theme, backgrounds, couleurs) + composants TSX (classes)
          - **Layout/structure** -> src/components/sections/*.tsx + src/app/page.tsx

          ATTENTION : quand le client dit "changer l'image de fond" ou "remplacer le mur en bois",
          c'est un changement de STYLE (background dans le CSS ou le composant), PAS un changement d'image content.
          Regarde le code source pour identifier si c'est un background-image en CSS, une texture dans le composant,
          ou une image dans le content.

          ## Regles de decoupage

          Chaque tache = UN changement atomique.
          Ne regroupe PAS plusieurs changements dans une meme tache.

          ## Format de sortie

          Ecris .retour/tasks/task-{N}.json pour chaque tache :

          {
            "id": 1,
            "status": "implement|adapt|reject|question",
            "type": "content|image|style|layout|new-section|bug|question",
            "section": "hero|about|services|pricing|contact|testimonials|gallery|faq|footer|header|gift-card|other",
            "title": "Description courte",
            "description": "Ce qu'il faut faire (ta version experte, pas forcement mot pour mot le client)",
            "targetFiles": ["content/hero.ts"],
            "images": [{"name": "mur-terre.jpeg", "url": "https://..."}],
            "clientQuote": "Le texte exact du client",
            "expertNote": "Pourquoi tu adaptes ou rejettes (vide si implement direct)",
            "implementation": "Instructions precises pour l'implementer : quel fichier, quelle ligne, quel changement"
          }

          Puis ecris .retour/tasks/manifest.json :

          {
            "totalTasks": 15,
            "implemented": 10,
            "adapted": 3,
            "rejected": 1,
            "questions": 1,
            "tasks": [
              {"id": 1, "status": "implement", "type": "content", "section": "hero", "title": "..."},
              {"id": 2, "status": "reject", "type": "layout", "section": "hero", "title": "3e CTA hero", "expertNote": "..."},
              {"id": 3, "status": "adapt", "type": "style", "section": "hero", "title": "Fond hero", "expertNote": "..."}
            ]
          }

          ## Important

          - Chaque tache INDEPENDANTE et implementable seule
          - Inclus les images associees (URLs GitHub, pas Tally)
          - Pour les rejets : sois professionnel et pedagogique dans expertNote
          - Pour les adaptations : explique ce que tu changes et pourquoi
          - Utilise CLAUDE.md + lecture du code source pour les targetFiles exacts
          - Verifie dans le code si un "changement d'image" est vraiment dans content/ ou dans le style CSS
          EOF

          claude --dangerously-skip-permissions --verbose -p "$(cat .retour/prompts/parser.txt)"

      # ══════════════════════════════════════════════
      # AGENT 2 : IMPLEMENTERS (parallel)
      # ══════════════════════════════════════════════
      - name: "Agent 2: Implement tasks (parallel)"
        run: |
          if [ ! -f .retour/tasks/manifest.json ]; then
            echo "ERROR: No manifest.json found. Parser failed."
            exit 1
          fi

          # Get implementable task IDs (skip questions AND rejections)
          IMPL_TASKS=$(python3 -c "
          import json
          data = json.load(open('.retour/tasks/manifest.json'))
          impl = [t for t in data['tasks'] if t.get('status') in ('implement', 'adapt')]
          print(' '.join(str(t['id']) for t in impl))
          ")

          echo "Tasks to implement: $IMPL_TASKS"

          PIDS=()

          for TASK_ID in $IMPL_TASKS; do
            TASK_FILE=".retour/tasks/task-${TASK_ID}.json"
            if [ ! -f "$TASK_FILE" ]; then
              echo "WARN: $TASK_FILE not found, skipping"
              continue
            fi

            TASK_TITLE=$(python3 -c "import json; print(json.load(open('$TASK_FILE'))['title'])")
            echo "Starting task $TASK_ID: $TASK_TITLE"

            # Write focused prompt for this task
            PROMPT_FILE=".retour/prompts/impl-${TASK_ID}.txt"
            cat > "$PROMPT_FILE" << IMPLEOF
          Tu es l'agent IMPLEMENTER du pipeline retour client WeAreReSite.
          Tu implemente UNE SEULE tache. Lis le fichier $TASK_FILE pour la connaitre.

          ## Instructions

          1. Lis CLAUDE.md pour comprendre l'architecture
          2. Lis le champ "implementation" de ta tache — il contient les instructions precises du directeur artistique
          3. Lis les fichiers cibles dans targetFiles
          4. Implemente le changement
          5. Verifie avec npx tsc --noEmit

          ## Comprendre ou modifier

          L'architecture separe strictement 3 couches :

          | Ce que tu changes | Ou modifier |
          |-------------------|-------------|
          | Texte, labels, descriptions | content/*.ts |
          | Image de contenu (photo, logo) | content/*.ts (ref) + public/images/ (fichier) |
          | Background, texture, couleur de fond | src/app/globals.css OU src/components/sections/*.tsx (classes CSS) |
          | Layout, structure, ordre | src/components/sections/*.tsx + src/app/page.tsx |
          | Animation | src/components/sections/*.tsx (GSAP) |

          ATTENTION : un "fond" ou "arriere-plan" est TOUJOURS du style (CSS background-image/background-color),
          JAMAIS une image de contenu. Cherche dans globals.css et dans le composant TSX pour trouver ou il est defini.

          ## Regles

          - Ne JAMAIS hardcoder du texte dans les composants TSX -> toujours content/*.ts
          - Si status=adapt, suis les instructions du champ "implementation", pas le texte brut du client
          - Images : telecharge l'URL dans public/images/, mets a jour le content
          - Ne touche PAS aux fichiers hors de targetFiles sauf si necessaire
          - Commite avec : git add -A && git commit -m "retour: task ${TASK_ID} - ${TASK_TITLE}"
          IMPLEOF

            # Launch in background
            claude --dangerously-skip-permissions --verbose -p "$(cat "$PROMPT_FILE")" \
              > ".retour/logs/task-${TASK_ID}.log" 2>&1 &
            PIDS+=($!)
            echo "  -> PID $! for task $TASK_ID"

            # Batch of 3 max
            if [ ${#PIDS[@]} -ge 3 ]; then
              echo "Waiting for batch..."
              for PID in "${PIDS[@]}"; do
                wait "$PID" || echo "WARN: PID $PID failed"
              done
              PIDS=()
            fi
          done

          # Wait for remaining
          for PID in "${PIDS[@]}"; do
            wait "$PID" || echo "WARN: PID $PID failed"
          done

          echo "All tasks completed."

      # ══════════════════════════════════════════════
      # AGENT 3 : QA
      # ══════════════════════════════════════════════
      - name: "Agent 3: QA & Build"
        run: |
          cat > .retour/prompts/qa.txt << 'EOF'
          Tu es l'agent QA du pipeline retour client WeAreReSite.

          1. Verifie la compilation : npx tsc --noEmit (corrige si erreur, max 3 tentatives)
          2. Verifie le build : npx next build (corrige si erreur, max 3 tentatives)
          3. Lis TOUS les fichiers .retour/tasks/task-*.json
          4. Regarde git diff pour voir ce qui a ete modifie
          5. Lis .retour/answers/answer-*.md s'ils existent

          Genere .retour/pr-summary.md avec ce format :

          ## Retour Client - Resume

          ### Changements implementes
          | # | Type | Section | Description | Status |
          |---|------|---------|-------------|--------|
          | 1 | content | hero | Modifier le slogan | OK |

          ### Adaptations (demande client modifiee par notre expertise)
          | # | Demande client | Notre adaptation | Raison |
          |---|---------------|-----------------|--------|
          | 5 | Ajouter 3 CTAs au hero | Garde 2 CTAs, ajoute "Offrir" en secondaire | Max 2 CTAs par section pour la conversion |

          ### Non implemente (deconseille)
          | # | Demande | Raison du refus |
          |---|---------|----------------|
          | 8 | ... | ... |

          ### Questions du client
          - **Q**: "..." / **R**: "..."

          ### Notes techniques
          [Problemes rencontres, decisions prises]

          IMPORTANT : le resume sera lu par Nathan (le gerant de l'agence) ET potentiellement
          montre au client. Sois professionnel et pedagogique dans les explications de refus/adaptation.
          Ecris en francais.

          Si le build echoue apres 3 tentatives, marque NEEDS_MANUAL_FIX.
          Ne modifie le code QUE pour corriger des erreurs de compilation/build.
          Commite les fixes avec : git add -A && git commit -m "retour: qa fixes"
          EOF

          claude --dangerously-skip-permissions --verbose -p "$(cat .retour/prompts/qa.txt)"

      # ══════════════════════════════════════════════
      # Push + PR + Notify
      # ══════════════════════════════════════════════
      - name: Push and create PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"

          # Check if there are uncommitted changes left
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git reset -- .retour/logs/ .retour/prompts/
            git commit -m "retour: remaining changes" || true
          fi

          # Check if we have any commits beyond the base
          DEFAULT_BRANCH=$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name')
          COMMIT_COUNT=$(git rev-list --count "${DEFAULT_BRANCH}..HEAD")

          if [ "$COMMIT_COUNT" -eq 0 ]; then
            echo "No commits to push"
            exit 0
          fi

          git push origin "$BRANCH" --force-with-lease

          PR_BODY="Implementation automatique du retour #${ISSUE_NUMBER}."
          if [ -f .retour/pr-summary.md ]; then
            PR_BODY=$(cat .retour/pr-summary.md)
          fi

          FULL_BODY="${PR_BODY}

          ---
          Closes #${ISSUE_NUMBER}
          *Pipeline multi-agent Claude Code*"

          # Check if PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null)

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating..."
            gh pr edit "$EXISTING_PR" --body "$FULL_BODY"
          else
            gh pr create \
              --title "Retour #${ISSUE_NUMBER} - $(echo "$ISSUE_TITLE" | sed 's/\[Retour #[0-9]*\] //')" \
              --body "$FULL_BODY" \
              --head "$BRANCH" \
              --base "$DEFAULT_BRANCH"
          fi

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" --add-label "needs-manual-fix" 2>/dev/null || true
          gh issue comment "$ISSUE_NUMBER" --body "L'implementation automatique a echoue. [Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" 2>/dev/null || true

      - name: Notify
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          JOB_STATUS: ${{ job.status }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -z "$GMAIL_USER" ] || [ -z "$GMAIL_APP_PASSWORD" ] || [ -z "$NOTIFICATION_EMAIL" ]; then
            echo "Email not configured, skipping"
            exit 0
          fi

          python3 << 'PYEOF'
          import smtplib, os
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart

          status = os.environ['JOB_STATUS']
          repo = os.environ['REPO_NAME']
          issue_url = os.environ['ISSUE_URL']

          if status == 'success':
              subject = f'[ReSite] PR pret - {repo}'
              body = f'Retour client traite avec succes.\n\nIssue: {issue_url}\nVerifiez le PR.'
          else:
              subject = f'[ReSite] ERREUR - {repo}'
              body = f'Erreur traitement retour.\n\nIssue: {issue_url}\nStatus: {status}'

          msg = MIMEMultipart()
          msg['From'] = os.environ['GMAIL_USER']
          msg['To'] = os.environ['NOTIFICATION_EMAIL']
          msg['Subject'] = subject
          msg['X-Priority'] = '1'
          msg['Importance'] = 'high'
          msg.attach(MIMEText(body, 'plain'))

          with smtplib.SMTP('smtp.gmail.com', 587) as s:
              s.starttls()
              s.login(os.environ['GMAIL_USER'], os.environ['GMAIL_APP_PASSWORD'])
              s.send_message(msg)
          print('Email sent')
          PYEOF
